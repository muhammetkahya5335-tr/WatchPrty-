<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 SynchroVid Modern</title>
  <style>
    /* === MODERN DARK & GLASS THEME === */
    :root {
      --bg-gradient: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
      --card-bg: rgba(255, 255, 255, 0.05);
      --accent: #4ecca3;
      --accent-hover: #45b293;
      --text-main: #e0e0e0;
      --text-dim: #a0a0a0;
      --glass-border: rgba(255, 255, 255, 0.1);
      --error: #ff4d4d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      padding: 3.5rem;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      width: 450px;
    }

    .title-group { text-align: center; }
    .main-title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(to right, #4ecca3, #45e3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      background: var(--accent);
      border: none;
      color: #1a1a2e;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(78, 204, 163, 0.3);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    input {
      padding: 14px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: var(--accent); }

    #app {
      display: none;
      width: 100vw;
      height: 100vh;
      grid-template-columns: 1fr 350px;
      grid-template-areas: "player sidebar";
      gap: 0;
    }

    .player-area {
      grid-area: player;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: rgba(0,0,0,0.1);
    }

    .video-wrapper {
      position: relative;
      padding-top: 56.25%;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 15px 25px;
      border-radius: 15px;
      border: 1px solid var(--glass-border);
    }

    .sidebar {
      grid-area: sidebar;
      background: rgba(10, 10, 25, 0.5);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-content {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
    }

    .chat-area {
      height: 350px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      background: rgba(0,0,0,0.2);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 15px;
      font-size: 0.95rem;
    }
    .message { margin-bottom: 10px; line-height: 1.4; }
    .message .user { color: var(--accent); font-weight: 600; margin-right: 8px; }

    .mic-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
    }
    .mic-btn.active {
      background: var(--error);
      box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
    }

    .seek-bar {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    #playlist { margin-top: 15px; }
    #playlist li {
      padding: 10px;
      border-bottom: 1px solid var(--glass-border);
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    @media (max-width: 1000px) {
      #app { grid-template-columns: 1fr; grid-template-rows: 1fr 400px; grid-template-areas: "player" "sidebar"; }
      .sidebar { border-left: none; border-top: 1px solid var(--glass-border); }
    }
  </style>
</head>
<body>

  <div id="lobby">
    <div class="title-group">
      <h1 class="main-title">SynchroVid</h1>
      <p style="color: var(--text-dim); margin-top: 5px;">Arkadaşlarınla aynı anda izle.</p>
    </div>
    
    <input type="text" id="usernameInput" placeholder="Kullanıcı adınız" style="width: 100%;" />
    
    <button class="btn" id="createRoomBtn" style="width: 100%;">➕ Yeni Oda Oluştur</button>
    
    <div style="display:flex; gap:10px; width: 100%;">
      <input type="text" id="roomCodeInput" placeholder="Kod" maxlength="4" style="width: 80px;" />
      <button class="btn btn-secondary" id="joinRoomBtn" style="flex: 1;">🔗 Odaya Katıl</button>
    </div>
    
    <p id="lobbyError" style="color:var(--error); font-size: 0.9rem;"></p>
  </div>

  <div id="app">
    <div class="player-area">
      <div class="video-wrapper">
        <div id="videoContainer"></div>
      </div>
      
      <div class="controls" id="controls">
        <button id="playPauseBtn" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">▶️</button>
        <input type="range" id="seekBar" class="seek-bar" min="0" max="100" step="0.1" value="0" />
        <span id="timeDisplay" style="font-family: monospace; font-size: 0.9rem;">00:00 / 00:00</span>
        <button id="micBtn" class="mic-btn">🎤</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-content">
        <h3 style="color:var(--accent); font-size: 1.1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">🎵 Sıradaki Videolar</h3>
        <ul id="playlist"></ul>
        
        <div id="adminPanel" style="display:none; margin-top: 30px;">
          <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px;">Video Ekle (YouTube/Drive)</p>
          <input type="text" id="videoLinkInput" placeholder="Link yapıştırın..." style="width:100%; margin-bottom:10px; padding: 10px;" />
          <button class="btn" id="addBtn" style="width:100%; padding: 10px;">Ekle</button>
        </div>
      </div>

      <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div style="display:flex; gap:8px;">
          <input type="text" id="chatInput" placeholder="Mesaj yaz..." style="flex:1; padding: 10px;" />
          <button class="btn" id="sendChatBtn" style="padding: 10px 20px;">Gönder</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>
</html>
