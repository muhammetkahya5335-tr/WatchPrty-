<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SYNC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(10, 10, 10, 0.95); border: 1px solid #00f2fe; padding: 30px; border-radius: 25px; width: 320px; text-align: center; box-shadow: 0 0 20px #00f2fe44; }
        h1 { font-family: 'Orbitron'; color: #00f2fe; margin-bottom: 25px; text-shadow: 0 0 10px #00f2fe; }
        input { background: #050505; border: 1px solid #222; color: #fff; padding: 12px; width: 100%; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn { background: transparent; border: 1px solid #00f2fe; color: #00f2fe; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .btn:hover { background: #00f2fe; color: #000; }
        .row { display: flex; gap: 10px; }
        #playlist-view { display: none; }
        .purple-btn { background: #7000ff; border: none; color: white; width: 50px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card" id="lobby-view">
        <h1>NEON SYNC</h1>
        <input type="text" id="username" placeholder="KULLANICI ADINIZ...">
        <button class="btn" style="width:100%;" onclick="goPlaylist()">YENİ ODA OLUŞTUR</button>
        <div style="margin: 15px 0; color: #333;">──</div>
        <div class="row">
            <input type="text" id="joinCode" placeholder="ODA KODU..." style="margin:0;">
            <button class="btn" onclick="joinRoom()">KATIL</button>
        </div>
    </div>

    <div class="card" id="playlist-view">
        <h1>PLAYLIST KUR</h1>
        <div id="status" style="font-size:12px; color:#00f2fe; margin-bottom:10px;">Liste Boş</div>
        <div class="row">
            <input type="text" id="vidLink" placeholder="YT veya Drive Linki..." style="margin:0;">
            <button class="purple-btn" onclick="addToList()">+</button>
        </div>
        <button class="btn" style="width:100%; margin-top:15px; border-color:#7000ff; color:#7000ff;" onclick="finish()">ODAYI BAŞLAT</button>
    </div>

    <script>
        let list = [];
        function goPlaylist() {
            if(!document.getElementById('username').value) return alert("İsim yaz!");
            document.getElementById('lobby-view').style.display='none';
            document.getElementById('playlist-view').style.display='block';
        }
        function addToList() {
            const link = document.getElementById('vidLink').value;
            if(link) {
                list.push(link);
                document.getElementById('status').innerText = list.length + " Video Eklendi";
                document.getElementById('vidLink').value = "";
            }
        }
        function finish() {
            const room = Math.random().toString(36).substring(2,7).toUpperCase();
            const user = document.getElementById('username').value;
            localStorage.setItem('playlist', JSON.stringify(list));
            window.location.href = `watch.html?user=${user}&room=${room}&role=host`;
        }
        function joinRoom() {
            const user = document.getElementById('username').value;
            const code = document.getElementById('joinCode').value.toUpperCase();
            if(user && code) window.location.href = `watch.html?user=${user}&room=${code}&role=guest`;
        }
    </script>
</body>
</html>
