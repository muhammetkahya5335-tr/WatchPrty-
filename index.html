<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch PartyC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');

        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(10,10,10,0.95);
            border: 1px solid #00f2fe;
            padding: 30px;
            border-radius: 25px;
            width: 340px;
            text-align: center;
            box-shadow: 0 0 20px #00f2fe44;
        }
        h1 { font-family: 'Orbitron'; color: #00f2fe; margin: 0 0 25px; text-shadow: 0 0 10px #00f2fe; }
        input {
            background: #050505;
            border: 1px solid #222;
            color: #fff;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            margin-bottom: 12px;
            outline: none;
            font-size: 15px;
            font-family: 'Rajdhani', sans-serif;
        }
        input:focus { border-color: #00f2fe44; }
        .btn {
            background: transparent;
            border: 1px solid #00f2fe;
            color: #00f2fe;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 13px;
            transition: 0.3s;
        }
        .btn:hover { background: #00f2fe; color: #000; }
        .row { display: flex; gap: 10px; }
        #playlist-view { display: none; }
        .add-btn {
            background: #7000ff;
            border: none;
            color: white;
            width: 46px;
            flex-shrink: 0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
        }
        .add-btn:hover { background: #8a1fff; }

        /* Playlist önizleme */
        #playlist-preview {
            margin-top: 12px;
            max-height: 160px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .pitem {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 7px 10px;
            text-align: left;
            font-size: 13px;
            color: #ccc;
        }
        .pitem .badge-type {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .badge-yt   { background: #ff0000; color: #fff; }
        .badge-drive{ background: #1a73e8; color: #fff; }
        .badge-unknown { background: #333; color: #aaa; }
        .pitem .ptext {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pitem .del-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            line-height: 1;
        }
        .pitem .del-btn:hover { color: #ff4444; }

        #status { font-size: 12px; color: #00f2fe; margin-bottom: 10px; }
    </style>
</head>
<body>
    <!-- Giriş Ekranı -->
    <div class="card" id="lobby-view">
        <h1>Watch Party</h1>
        <input type="text" id="username" placeholder="KULLANICI ADINIZ...">
        <button class="btn" onclick="goPlaylist()">YENİ ODA OLUŞTUR</button>
        <div style="margin: 15px 0; color: #333;">──</div>
        <div class="row">
            <input type="text" id="joinCode" placeholder="ODA KODU..." style="margin:0;">
            <button class="btn" style="width:auto;padding:12px 16px;" onclick="joinRoom()">KATIL</button>
        </div>
    </div>

    <!-- Playlist Kurma Ekranı -->
    <div class="card" id="playlist-view">
        <h1>PLAYLIST KUR</h1>
        <div id="status">Liste Boş</div>

        <div class="row">
            <input type="text" id="vidLink" placeholder="YouTube veya Drive linki..." style="margin:0;">
            <button class="add-btn" onclick="addToList()">+</button>
        </div>

        <!-- Eklenen videolar -->
        <div id="playlist-preview"></div>

        <button class="btn" style="margin-top:16px; border-color:#7000ff; color:#7000ff;" onclick="finish()">
            ODAYI BAŞLAT
        </button>
    </div>

    <script>
        let list = [];

        function detectType(url) {
            if (/(?:youtu\.be\/|[?&]v=|\/embed\/|\/v\/)([a-zA-Z0-9_-]{11})/.test(url)) return 'yt';
            if (/drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=|docs\.google\.com\/file\/d\//.test(url)) return 'drive';
            return 'unknown';
        }

        function goPlaylist() {
            if (!document.getElementById('username').value.trim()) return alert("İsim yaz!");
            document.getElementById('lobby-view').style.display = 'none';
            document.getElementById('playlist-view').style.display = 'block';
        }

        function addToList() {
            const inp = document.getElementById('vidLink');
            const link = inp.value.trim();
            if (!link) return;

            const type = detectType(link);
            if (type === 'unknown') {
                alert("Geçersiz link! Sadece YouTube veya Google Drive linkleri desteklenir.");
                return;
            }

            list.push(link);
            inp.value = '';
            renderPreview();
        }

        // Enter ile de ekleyebilsin
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('vidLink').addEventListener('keydown', e => {
                if (e.key === 'Enter') addToList();
            });
        });

        function removeItem(index) {
            list.splice(index, 1);
            renderPreview();
        }

        function renderPreview() {
            const preview = document.getElementById('playlist-preview');
            const status  = document.getElementById('status');

            if (list.length === 0) {
                status.innerText = 'Liste Boş';
                preview.innerHTML = '';
                return;
            }

            status.innerText = list.length + ' Video Eklendi';
            preview.innerHTML = '';

            list.forEach((url, i) => {
                const type = detectType(url);
                const label = type === 'yt' ? 'YT' : type === 'drive' ? 'DRIVE' : '?';
                const cls   = type === 'yt' ? 'badge-yt' : type === 'drive' ? 'badge-drive' : 'badge-unknown';

                // Kısa URL göster
                const shortUrl = url.length > 42 ? url.slice(0, 42) + '…' : url;

                const div = document.createElement('div');
                div.className = 'pitem';
                div.innerHTML = `
                    <span class="badge-type ${cls}">${label}</span>
                    <span class="ptext" title="${url}">${shortUrl}</span>
                    <button class="del-btn" onclick="removeItem(${i})">×</button>
                `;
                preview.appendChild(div);
            });
        }

        function finish() {
            if (list.length === 0) return alert("En az 1 video ekle!");
            const room = Math.random().toString(36).substring(2, 7).toUpperCase();
            const user = document.getElementById('username').value.trim();
            localStorage.setItem('playlist', JSON.stringify(list));
            window.location.href = `watch.html?user=${encodeURIComponent(user)}&room=${room}&role=host`;
        }

        function joinRoom() {
            const user = document.getElementById('username').value.trim();
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (!user) return alert("İsim yaz!");
            if (!code)  return alert("Oda kodu gir!");
            window.location.href = `watch.html?user=${encodeURIComponent(user)}&room=${code}&role=guest`;
        }
    </script>
</body>
</html>
