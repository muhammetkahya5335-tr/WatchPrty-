<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch | NEON SYNC</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Video */
        .video-container {
            flex: 0 0 45%;
            background: #000;
            position: relative;
            border-bottom: 2px solid #00f2fe;
        }
        #player { width: 100%; height: 100%; }
        .badges {
            position: absolute;
            top: 10px; left: 10px;
            z-index: 10;
            display: flex;
            gap: 8px;
            pointer-events: none;
        }
        .badge {
            background: rgba(0,0,0,0.8);
            border: 1px solid #00f2fe;
            padding: 4px 8px;
            border-radius: 4px;
            color: #00f2fe;
            font-size: 10px;
            font-weight: bold;
        }

        /* Alt Panel */
        .bottom-panel {
            flex: 1;
            display: flex;
            background: #050505;
            overflow: hidden;
            min-height: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 56px;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            flex-shrink: 0;
        }
        .sidebar i {
            font-size: 22px;
            color: #444;
            cursor: pointer;
            transition: color 0.3s, text-shadow 0.3s;
        }
        .sidebar i.active {
            color: #00f2fe;
            text-shadow: 0 0 10px #00f2fe;
        }

        /* Chat */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .msg {
            background: rgba(255,255,255,0.03);
            padding: 8px 12px;
            border-radius: 10px;
            border-left: 3px solid #00f2fe;
            font-size: 14px;
            align-self: flex-start;
            max-width: 90%;
            word-break: break-word;
        }
        .msg b {
            color: #00f2fe;
            font-size: 11px;
            display: block;
            margin-bottom: 2px;
        }

        /* Input Alanı — form YOK, div var (mobilde klavye için) */
        .message-input-area {
            padding: 10px 12px;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .message-input-area input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 16px;
            border-radius: 25px;
            outline: none;
            font-size: 16px; /* 16px → iOS zoom'u önler */
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .message-input-area input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0,242,254,0.2);
        }
        .send-btn {
            color: #00f2fe;
            font-size: 20px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .send-btn:active { opacity: 0.6; }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="badges">
            <div class="badge" id="roomLabel">ODA: ----</div>
            <div class="badge" id="roleLabel">ROL: GUEST</div>
        </div>
        <div id="player"></div>
    </div>

    <div class="bottom-panel">
        <div class="sidebar">
            <!-- Mikrofon: toggleMic() script.js'de tanımlı -->
            <i class="fas fa-microphone" id="micBtn" onclick="toggleMic()"></i>
            <i class="fas fa-comment-dots active"></i>
        </div>

        <div class="chat-section">
            <div id="chat-flow"></div>

            <!-- FORM YOK — Submit sinyali input'ta Enter + buton onclick ile -->
            <div class="message-input-area">
                <input
                    type="text"
                    id="chatInp"
                    placeholder="Bir mesaj yaz..."
                    autocomplete="off"
                    enterkeyhint="send"
                    onkeydown="if(event.key==='Enter'){ sendChat(); }"
                >
                <button class="send-btn" onclick="sendChat()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
