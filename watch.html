<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch | NEON SYNC</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Video ── */
        .video-container {
            flex: 0 0 45%;
            background: #000;
            position: relative;
            border-bottom: 2px solid #00f2fe;
        }
        #player { width: 100%; height: 100%; }

        .badges {
            position: absolute;
            top: 10px; left: 10px;
            z-index: 10;
            display: flex;
            gap: 8px;
            pointer-events: none;
        }
        .badge {
            background: rgba(0,0,0,0.8);
            border: 1px solid #00f2fe;
            padding: 4px 8px;
            border-radius: 4px;
            color: #00f2fe;
            font-size: 10px;
            font-weight: bold;
        }

        /* Guest overlay: tüm video alanını kaplayan şeffaf bariyer */
        /* YT controls:0 ile birlikte tıklama / scroll senkronizasyonunu önler */
        #guest-overlay {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 5;
            cursor: not-allowed;
        }

        /* ── Alt Panel ── */
        .bottom-panel {
            flex: 1;
            display: flex;
            background: #050505;
            overflow: hidden;
            min-height: 0;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 56px;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 22px;
            flex-shrink: 0;
        }
        .sidebar i {
            font-size: 21px;
            color: #444;
            cursor: pointer;
            transition: color 0.3s, text-shadow 0.3s;
        }
        .sidebar i.active {
            color: #00f2fe;
            text-shadow: 0 0 10px #00f2fe;
        }
        .sidebar i:hover { color: #00f2fe88; }

        /* ── Panel Container ── */
        .panel-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        /* ── Chat ── */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .msg {
            background: rgba(255,255,255,0.03);
            padding: 8px 12px;
            border-radius: 10px;
            border-left: 3px solid #00f2fe;
            font-size: 14px;
            align-self: flex-start;
            max-width: 90%;
            word-break: break-word;
        }
        .msg b {
            color: #00f2fe;
            font-size: 11px;
            display: block;
            margin-bottom: 2px;
        }

        .message-input-area {
            padding: 10px 12px;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .message-input-area input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 16px;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .message-input-area input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0,242,254,0.2);
        }
        .send-btn {
            color: #00f2fe;
            font-size: 20px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .send-btn:active { opacity: 0.6; }

        /* ── Playlist Panel ── */
        #playlist-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        #playlist-panel.visible { display: flex; }

        .playlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        .playlist-header span {
            font-size: 12px;
            color: #00f2fe;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Önceki / Sonraki butonları (sadece host) */
        .pl-nav {
            display: flex;
            gap: 8px;
        }
        .pl-nav button {
            background: transparent;
            border: 1px solid #333;
            color: #aaa;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: border-color 0.2s, color 0.2s;
        }
        .pl-nav button:hover { border-color: #00f2fe; color: #00f2fe; }

        #playlist-panel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .plist-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 13px;
            color: #ccc;
            transition: border-color 0.2s;
        }
        .plist-item.active {
            border-color: #00f2fe;
            background: rgba(0,242,254,0.05);
        }
        .plist-badge {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .badge-yt    { background: #ff0000; color: #fff; }
        .badge-drive { background: #1a73e8; color: #fff; }
        .badge-unknown { background: #333; color: #aaa; }
        .plist-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }
        .plist-play-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            padding: 2px 4px;
            transition: color 0.2s;
        }
        .plist-play-btn:hover { color: #00f2fe; }

        /* Video ekleme alanı — sadece host görebilir */
        #add-video-area {
            padding: 10px 12px;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        #add-video-area input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 14px;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        #add-video-area input:focus { border-color: #7000ff; }
        #add-video-area button {
            background: #7000ff;
            border: none;
            color: #fff;
            padding: 10px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #add-video-area button:hover { background: #8a1fff; }
    </style>
</head>
<body>

    <!-- Video -->
    <div class="video-container">
        <div class="badges">
            <div class="badge" id="roomLabel">ODA: ----</div>
            <div class="badge" id="roleLabel">ROL: GUEST</div>
        </div>
        <!-- Guest overlay: tıklama/etkileşimi engeller -->
        <div id="guest-overlay"></div>
        <div id="player"></div>
    </div>

    <!-- Alt Panel -->
    <div class="bottom-panel">

        <!-- Sidebar -->
        <div class="sidebar">
            <i class="fas fa-microphone" id="micBtn" onclick="toggleMic()" title="Sesli Sohbet"></i>
            <i class="fas fa-comment-dots active" id="tabChat"    onclick="switchTab('chat')"     title="Sohbet"></i>
            <i class="fas fa-list"                id="tabPlaylist" onclick="switchTab('playlist')" title="Playlist"></i>
        </div>

        <!-- Panel Wrap -->
        <div class="panel-wrap">

            <!-- Sohbet -->
            <div class="chat-section" id="chat-panel">
                <div id="chat-flow"></div>
                <div class="message-input-area">
                    <input
                        type="text"
                        id="chatInp"
                        placeholder="Bir mesaj yaz..."
                        autocomplete="off"
                        enterkeyhint="send"
                        onkeydown="if(event.key==='Enter'){ sendChat(); }"
                    >
                    <button class="send-btn" onclick="sendChat()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <!-- Playlist -->
            <div id="playlist-panel">
                <div class="playlist-header">
                    <span>📋 PLAYLİST</span>
                    <div class="pl-nav" id="pl-nav-btns" style="display:none;">
                        <button onclick="hostPrev()">◀ Önceki</button>
                        <button onclick="hostNext()">Sonraki ▶</button>
                    </div>
                </div>
                <div id="playlist-panel-list"></div>
                <!-- Video ekleme: yalnızca host için gösterilir -->
                <div id="add-video-area" style="display:none;">
                    <input
                        type="text"
                        id="addVideoInp"
                        placeholder="YouTube veya Drive linki ekle..."
                        enterkeyhint="done"
                        onkeydown="if(event.key==='Enter'){ addVideoToRoom(); }"
                    >
                    <button onclick="addVideoToRoom()">+</button>
                </div>
            </div>

        </div><!-- /panel-wrap -->
    </div><!-- /bottom-panel -->

    <script src="script.js"></script>
    <script>
        // ── TAB SWITCH ────────────────────────────────────────────────────────
        function switchTab(tab) {
            const chatPanel     = document.getElementById('chat-panel');
            const playlistPanel = document.getElementById('playlist-panel');
            const tabChat       = document.getElementById('tabChat');
            const tabPlaylist   = document.getElementById('tabPlaylist');

            if (tab === 'chat') {
                chatPanel.style.display     = 'flex';
                playlistPanel.classList.remove('visible');
                tabChat.classList.add('active');
                tabPlaylist.classList.remove('active');
            } else {
                chatPanel.style.display     = 'none';
                playlistPanel.classList.add('visible');
                tabChat.classList.remove('active');
                tabPlaylist.classList.add('active');
            }
        }

        // ── ROLE BAZLI UI ─────────────────────────────────────────────────────
        // FIX: role değişkenini script.js'e bağımlı olmadan, doğrudan URL'den oku.
        // Önceki kodda DOMContentLoaded + setTimeout(50ms) + script.js bağımlılığı
        // bir yarış koşulu (race condition) yaratıyordu: script.js henüz parse
        // edilmeden önce 'role' undefined dönüyordu ve add-video-area hiç
        // gösterilmiyordu; bu yüzden playlist'e video eklemek mümkün olmuyordu.
        // Çözüm: URL parametresini watch.html içinde bağımsız olarak oku.
        (function applyRoleUI() {
            const urlRole = new URLSearchParams(window.location.search).get('role') || 'guest';

            if (urlRole === 'host') {
                document.getElementById('guest-overlay').style.display  = 'none';
                document.getElementById('pl-nav-btns').style.display    = 'flex';
                document.getElementById('add-video-area').style.display = 'flex';
            } else {
                document.getElementById('guest-overlay').style.display  = 'block';
                document.getElementById('pl-nav-btns').style.display    = 'none';
                document.getElementById('add-video-area').style.display = 'none';
            }
        })();
    </script>
</body>
</html>
